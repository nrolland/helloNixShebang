name: check

on:
  # Modèle « observatoire » : la CI n'est plus un portail par commit mais un
  # échantillonnage périodique. Un cron QUOTIDIEN réveille le job `gate`, qui
  # ne lance la matrice que s'il y a eu un changement dans les dernières 24 h ;
  # sinon il ne lance rien. Le lundi, la matrice tourne de toute façon (garde
  # hebdomadaire contre la pourriture externe : un mécanisme peut casser sans
  # qu'on ait touché au code) et inclut la jambe macOS.
  #
  # Le développement ne déclenche AUCUN run (pas de push/pull_request) : c'est
  # ce qui laissait chaque commit brûler le budget Actions. Retour immédiat en
  # local via `./check.sh` ; run à la demande via `workflow_dispatch`.
  schedule:
    - cron: "0 6 * * *" # quotidien 06:00 UTC ; le job `gate` décide de lancer ou non
  workflow_dispatch:
    inputs:
      macos:
        description: "Inclure la jambe macOS (coûteuse ×10) en plus de Linux"
        type: boolean
        default: false

# Annule un run supersédé par un plus récent du même événement sur la même
# réf. La clé inclut event_name pour que le cron ne soit jamais annulé par un
# dispatch manuel simultané.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    # Portier peu coûteux (quelques secondes, Linux) qui décide s'il faut
    # lancer la matrice et avec quels OS. Règle : lancer s'il y a eu un commit
    # sur master dans les dernières 25 h (fenêtre légèrement > 24 h pour ne pas
    # rater un commit entre deux réveils quotidiens), OU si on est lundi (garde
    # hebdomadaire), OU sur workflow_dispatch. macOS : le lundi, ou si demandé
    # explicitement au dispatch. Sépare « valider un changement » (≤ 1×/jour)
    # de « détecter la pourriture externe » (hebdo) — voir docs/journal.md.
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
      macos: ${{ steps.decide.outputs.macos }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: decide
        env:
          EVENT: ${{ github.event_name }}
          DISPATCH_MACOS: ${{ github.event.inputs.macos }}
        run: |
          set -euo pipefail
          dow=$(date -u +%u)                # 1 = lundi ... 7 = dimanche
          monday=false
          if [ "$dow" = "1" ]; then monday=true; fi
          changed=false
          if [ -n "$(git log --since='25 hours ago' --format=%H)" ]; then changed=true; fi
          run=false
          if $changed || $monday || [ "$EVENT" = "workflow_dispatch" ]; then run=true; fi
          macos=false
          if $monday; then macos=true; fi
          if [ "$EVENT" = "workflow_dispatch" ] && [ "$DISPATCH_MACOS" = "true" ]; then macos=true; fi
          echo "run=$run" >> "$GITHUB_OUTPUT"
          echo "macos=$macos" >> "$GITHUB_OUTPUT"
          echo "décision : run=$run macos=$macos (changed=$changed monday=$monday event=$EVENT)"

  check:
    # La promesse « scripts autosuffisants » doit tenir sur les deux OS où
    # les utilisateurs les lancent. La matrice exécute ./check.sh à
    # l'identique sur Linux et macOS ; fail-fast: false pour que les DEUX
    # jambes aillent au bout et produisent leur table de verdicts, même si
    # l'une échoue (la divergence par-OS est la donnée que cette matrice
    # produit — voir docs/journal.md).
    #
    # `gate` décide du lancement et de l'inclusion de macOS : Linux seul les
    # jours avec changement (peu coûteux), Linux + macOS le lundi (×10, réservé
    # à l'échantillon de portabilité hebdomadaire).
    needs: gate
    if: needs.gate.outputs.run == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: ${{ needs.gate.outputs.macos == 'true' && fromJSON('["ubuntu-latest","macos-latest"]') || fromJSON('["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    # macos-latest = runner ARM64 : nix sans cache binaire complet et stack
    # qui recompile son graphe de dépendances peuvent être lents à froid.
    # Timeout explicite et généreux (le défaut GitHub de 360 min laisserait
    # un run pathologique brûler des heures).
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: README à jour (garde de fraîcheur)
        # generate-readme.sh est déterministe (bash+awk) : la matrice du
        # README doit être son point fixe. Un désaccord signale un
        # README édité à la main ou un générateur qui n'a pas suivi une
        # modification de script — voir docs/plans/05-readme-genere.md.
        #
        # Le README est un artefact unique, indépendant de l'OS : on le
        # vérifie une seule fois (jambe Linux). L'exécuter aussi sur macOS
        # serait redondant et exposerait à une divergence awk BSD/GNU sans
        # rapport avec la fraîcheur du fichier.
        if: runner.os == 'Linux'
        run: |
          ./generate-readme.sh
          git diff --exit-code README.md

      - name: scripts assemblés à jour (garde de fraîcheur)
        # assemble-scripts.sh est déterministe (concaténation header ⊕ payload) :
        # chacun des 15 scripts de la racine doit être son point fixe. Un
        # désaccord signale un script édité à la main plutôt que via son header
        # ou son payload — la propriété « même payload, header variable » cesse
        # alors d'être garantie. Voir docs/plans/08-payload-reifie.md.
        #
        # Comme le README, les scripts sont un artefact indépendant de l'OS : on
        # les vérifie une seule fois (jambe Linux) — inutile et redondant sur
        # macOS (assemble-scripts.sh y tourne quand même, en bash 3.2 portable,
        # au titre de check.sh).
        if: runner.os == 'Linux'
        run: |
          ./assemble-scripts.sh
          git diff --exit-code *.hs *.py *.rb *.perl *.el *.ts *.clj *.rs *.scala

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10.3"
          cabal-version: "3.14"
          enable-stack: true
          stack-version: "latest"

      - name: cabal update
        # cabal_hello.hs a besoin d'un index Hackage déjà peuplé : le
        # solveur doit connaître le nom "type-level-sets" avant de le
        # faire pointer vers le dépôt git via source-repository-package.
        run: cabal update

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.21"

      - uses: denoland/setup-deno@v2.0.5
        with:
          deno-version: "2.8.3"

      - name: install babashka (pinné via nixpkgs, même rev que les shebangs nix)
        # Pas d'action tierce dédiée assez éprouvée ; nix (déjà installé
        # ci-dessus) donne le même mécanisme de pin par hash que le reste
        # du dépôt (voir docs/plans/03-pins-reifies.md). Le paquet évalue
        # pour aarch64-darwin à cette rev (vérifié avant CI).
        run: nix profile add "nixpkgs/4382ed2b7a6839d4280a9b386db49cbc5907414d#babashka"

      - name: install rust-script + cargo/rustc (pinné via nixpkgs, même rev que le reste)
        # Même raisonnement que babashka ci-dessus : pas de "cargo install"
        # global (interdit par le plan 06 — non pinné, mute l'état de
        # l'image), nix donne le pin par hash. cargo/rustc sont nécessaires
        # pour que rust-script compile le manifest inline. Les trois
        # paquets évaluent pour aarch64-darwin à cette rev (vérifié).
        run: nix profile add "nixpkgs/4382ed2b7a6839d4280a9b386db49cbc5907414d#rust-script" "nixpkgs/4382ed2b7a6839d4280a9b386db49cbc5907414d#cargo" "nixpkgs/4382ed2b7a6839d4280a9b386db49cbc5907414d#rustc"

      - name: install coreutils sur macOS (fournit GNU `timeout` au harnais)
        # check.sh borne chaque script avec `timeout "${TIMEOUT_S}s"` (GNU
        # coreutils). macOS/BSD ne fournit pas `timeout` — il n'existe que
        # sous le nom `gtimeout` (Homebrew coreutils, absent du runner),
        # d'où « timeout: command not found » et 15 FAIL à 0s au premier
        # run. On fournit `timeout` par nix à la même rev pinnée que le
        # reste du dépôt : cohérent avec le mécanisme de pin par hash, et
        # symétrique avec la jambe Linux où `timeout` vient de l'OS. macOS
        # uniquement pour laisser la jambe Linux (déjà verte) intacte.
        if: runner.os == 'macOS'
        run: nix profile add "nixpkgs/4382ed2b7a6839d4280a9b386db49cbc5907414d#coreutils"

      - uses: VirtusLab/scala-cli-setup@v1.15.0
        with:
          scala-cli-version: "1.14.0"

      - name: cache stack (~/.stack)
        # stack_hello_{In,NotIn}Stackage.hs compilent tout le graphe de
        # dépendances de lts-24.50 (GHC + http-client + tls + ... — une
        # dizaine de minutes à froid, constaté par exécution). Le cache
        # rend les runs suivants (dont le cron hebdomadaire) rapides ;
        # sans lui chaque run repart de zéro sur ce runner éphémère. La clé
        # est déjà indexée par runner.os : caches Linux et macOS distincts.
        uses: actions/cache@v4
        with:
          path: ~/.stack
          key: ${{ runner.os }}-stack-lts-24.50-${{ hashFiles('stack_hello_*.hs') }}
          restore-keys: |
            ${{ runner.os }}-stack-lts-24.50-

      - name: check.sh
        run: ./check.sh

      - name: upload logs + verdicts (toujours)
        # Toujours, pas seulement sur échec (plan 09) : le job `record` a
        # besoin des verdicts des DEUX jambes, y compris quand tout passe
        # (la série temporelle enregistre chaque run, pas seulement les
        # échecs), et des logs par script pour l'extrait d'une issue `rot`.
        # logs/ contient verdicts.tsv (émis par check.sh) + <script>.log.
        # `if: always()` remonte l'artefact même si check.sh a échoué.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.os }}
          path: logs/

  record:
    # Série temporelle + auto-signalement (plan 09). S'exécute APRÈS la matrice
    # (`needs: [gate, check]`) et MÊME SI une jambe a échoué (`if: always()` —
    # c'est là qu'enregistrer et signaler est le plus utile). Unique écrivain de
    # la branche `data` : un seul job après la matrice → pas de course entre OS.
    #
    # Ne tourne que si `gate` a lancé la matrice (sinon rien à enregistrer). Les
    # seuls déclencheurs étant désormais schedule et workflow_dispatch, chaque
    # run enregistré alimente la série ET peut ouvrir une issue `rot`.
    needs: [gate, check]
    if: always() && needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    # Permissions explicites au niveau du job (principe du moindre privilège) :
    # écrire la branche data (contents) et ouvrir/commenter des issues rot.
    permissions:
      contents: write
      issues: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: télécharger les verdicts des deux jambes
        # `pattern: logs-*` récupère chaque artefact dans son sous-dossier
        # (merge-multiple: false par défaut) : artifacts/logs-<os>/. Robuste à
        # une jambe manquante (aucune erreur si un seul artefact est présent —
        # le cas courant : les jours sans macOS, seul logs-ubuntu-latest existe).
        uses: actions/download-artifact@v4
        with:
          pattern: logs-*
          path: artifacts

      - name: appender la série temporelle sur la branche data
        run: ./.github/scripts/append-runs.sh artifacts

      - name: auto-signalement des pourritures (issues rot)
        # Sur schedule/workflow_dispatch (les seuls déclencheurs) : pour chaque
        # FAIL/TIMEOUT, ouvre ou alimente une issue `rot` — le canal du cron
        # non surveillé.
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: ./.github/scripts/rot-issues.sh artifacts
