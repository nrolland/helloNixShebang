name: check

on:
  push:
  pull_request:
  schedule:
    # lundi 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  check:
    # La promesse « scripts autosuffisants » doit tenir sur les deux OS où
    # les utilisateurs les lancent. La matrice exécute ./check.sh à
    # l'identique sur Linux et macOS ; fail-fast: false pour que les DEUX
    # jambes aillent au bout et produisent leur table de verdicts, même si
    # l'une échoue (la divergence par-OS est la donnée que cette matrice
    # produit — voir docs/journal.md).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    # macos-latest = runner ARM64 : nix sans cache binaire complet et stack
    # qui recompile son graphe de dépendances peuvent être lents à froid.
    # Timeout explicite et généreux (le défaut GitHub de 360 min laisserait
    # un run pathologique brûler des heures).
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: README à jour (garde de fraîcheur)
        # generate-readme.sh est déterministe (bash+awk) : la matrice du
        # README doit être son point fixe. Un désaccord signale un
        # README édité à la main ou un générateur qui n'a pas suivi une
        # modification de script — voir docs/plans/05-readme-genere.md.
        #
        # Le README est un artefact unique, indépendant de l'OS : on le
        # vérifie une seule fois (jambe Linux). L'exécuter aussi sur macOS
        # serait redondant et exposerait à une divergence awk BSD/GNU sans
        # rapport avec la fraîcheur du fichier.
        if: runner.os == 'Linux'
        run: |
          ./generate-readme.sh
          git diff --exit-code README.md

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.10.3"
          cabal-version: "3.14"
          enable-stack: true
          stack-version: "latest"

      - name: cabal update
        # cabal_hello.hs a besoin d'un index Hackage déjà peuplé : le
        # solveur doit connaître le nom "type-level-sets" avant de le
        # faire pointer vers le dépôt git via source-repository-package.
        run: cabal update

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.21"

      - uses: denoland/setup-deno@v2.0.5
        with:
          deno-version: "2.8.3"

      - name: install babashka (pinné via nixpkgs, même rev que les shebangs nix)
        # Pas d'action tierce dédiée assez éprouvée ; nix (déjà installé
        # ci-dessus) donne le même mécanisme de pin par hash que le reste
        # du dépôt (voir docs/plans/03-pins-reifies.md). Le paquet évalue
        # pour aarch64-darwin à cette rev (vérifié avant CI).
        run: nix profile add "nixpkgs/4382ed2b7a6839d4280a9b386db49cbc5907414d#babashka"

      - name: install rust-script + cargo/rustc (pinné via nixpkgs, même rev que le reste)
        # Même raisonnement que babashka ci-dessus : pas de "cargo install"
        # global (interdit par le plan 06 — non pinné, mute l'état de
        # l'image), nix donne le pin par hash. cargo/rustc sont nécessaires
        # pour que rust-script compile le manifest inline. Les trois
        # paquets évaluent pour aarch64-darwin à cette rev (vérifié).
        run: nix profile add "nixpkgs/4382ed2b7a6839d4280a9b386db49cbc5907414d#rust-script" "nixpkgs/4382ed2b7a6839d4280a9b386db49cbc5907414d#cargo" "nixpkgs/4382ed2b7a6839d4280a9b386db49cbc5907414d#rustc"

      - uses: VirtusLab/scala-cli-setup@v1.15.0
        with:
          scala-cli-version: "1.14.0"

      - name: cache stack (~/.stack)
        # stack_hello_{In,NotIn}Stackage.hs compilent tout le graphe de
        # dépendances de lts-24.50 (GHC + http-client + tls + ... — une
        # dizaine de minutes à froid, constaté par exécution). Le cache
        # rend les runs suivants (dont le cron hebdomadaire) rapides ;
        # sans lui chaque run repart de zéro sur ce runner éphémère. La clé
        # est déjà indexée par runner.os : caches Linux et macOS distincts.
        uses: actions/cache@v4
        with:
          path: ~/.stack
          key: ${{ runner.os }}-stack-lts-24.50-${{ hashFiles('stack_hello_*.hs') }}
          restore-keys: |
            ${{ runner.os }}-stack-lts-24.50-

      - name: check.sh
        run: ./check.sh

      - name: upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.os }}
          path: logs/
